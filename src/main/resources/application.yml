server:
  port: 8080
spring:
  application:
    name: yunxiutongDispatchSystem
  profiles:
    active: dev
  datasource:
    driver-class-name: ${YXT.datasource.driver-class-name}
    username: ${YXT.datasource.username}
    password: ${YXT.datasource.password}
    url:  jdbc:mysql://${YXT.datasource.host}:${YXT.datasource.port}/${YXT.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
  data:
    redis:
      host: ${STYX.data.redis.host}
      password: ${STYX.data.redis.password}
      lettuce:
        pool:
          max-active: ${STYX.data.redis.lettuce.pool.max-active}
          min-idle: ${STYX.data.redis.lettuce.pool.min-idle}
          max-idle: ${STYX.data.redis.lettuce.pool.max-idle}
      port: ${STYX.data.redis.port}
      database: 1
mybatis:
  configuration:
    #??????
    map-underscore-to-camel-case: true
  #????
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: org.example.entity
logging:
  level:
    org:
      example:
        mapper: debug
        service:  info
        controller: info
yxt:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    adminSecretKey: yxt-woaini-zhendema-zhende1-woyeaini
    # 设置jwt过期时间
    adminTtl: 7200000
    # 设置前端传递过来的令牌名称
    adminTokenName: token

